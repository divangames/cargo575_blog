name: Update views.json from Yandex Metrika

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-views:
    runs-on: ubuntu-latest
    env:
      PROJECT_DIR: views-kit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Detect project directory
        run: |
          if [ -f "views-kit/scripts/update-views.js" ]; then
            echo "PROJECT_DIR=views-kit" >> "$GITHUB_ENV"
          elif [ -f "scripts/update-views.js" ]; then
            echo "PROJECT_DIR=." >> "$GITHUB_ENV"
          else
            echo "Cannot find scripts/update-views.js in repo root or views-kit/"
            exit 1
          fi

      - name: Run updater
        env:
          YANDEX_TOKEN: ${{ secrets.YANDEX_TOKEN }}
          YANDEX_COUNTER_ID: ${{ secrets.YANDEX_COUNTER_ID }}
        run: node "$PROJECT_DIR/scripts/update-views.js"

      - name: Commit and push if changed
        run: |
          if git diff --quiet "$PROJECT_DIR/views.json"; then
            echo "No changes in views.json"
            exit 0
          fi
          git add "$PROJECT_DIR/views.json"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Update views.json from Yandex Metrika"
          git push
