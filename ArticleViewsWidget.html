<!-- Виджет просмотров для страницы статьи (LPMotor) -->
<!-- Укажите URL views.json: атрибут data-views-json или window.CARGO_VIEWS_JSON_URLS (см. views-kit/README.md) -->
<style>
    .lpm-article-meta-row {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        color: #333;
        font-family: 'Geologica', sans-serif;
        font-weight: 300;
        flex-wrap: wrap;
    }
    .lpm-article-meta-item {
        display: inline-flex;
        align-items: center;
        gap: 6px;
    }
    .lpm-article-meta-sep {
        opacity: .35;
    }
    @media (max-width: 767px) {
        .lpm-article-views-label {
            display: none;
        }
    }
</style>

<div
    class="lpm-article-views"
    title="Просмотры статьи"
    data-article-date="8 Апреля, 2026"
    data-article-path=""
    data-yandex-counter-id="102098359"
>
    <span class="lpm-article-meta-row">
        <span class="lpm-article-meta-item">
            <i class="ph ph-calendar-blank" style="color:#FF5A00;font-size:18px;"></i>
            <span class="lpm-article-date" style="font-weight:300;">8 Апреля, 2026</span>
        </span>
        <span class="lpm-article-meta-sep">|</span>
        <span class="lpm-article-meta-item">
            <i class="ph ph-eye" style="color:#FF5A00;font-size:18px;"></i>
            <span class="lpm-article-views-label" style="font-weight:300;">Просмотры:</span>
            <span class="lpm-article-views-value" style="font-variant-numeric:tabular-nums;font-weight:400;">—</span>
        </span>
    </span>
</div>

<script>
(function () {
    var refreshMs = 5 * 60 * 1000;

    function resolveViewsJsonUrls() {
        if (typeof window !== 'undefined' && Array.isArray(window.CARGO_VIEWS_JSON_URLS) && window.CARGO_VIEWS_JSON_URLS.length) {
            return window.CARGO_VIEWS_JSON_URLS.slice().filter(Boolean);
        }
        var root = document.querySelector('.lpm-article-views');
        var raw = root && root.getAttribute('data-views-json');
        if (raw) {
            return raw.split(',').map(function (s) { return s.trim(); }).filter(Boolean);
        }
        return [];
    }

    function parseJsonResponse(res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
    }

    function fetchViewsByUrl(url) {
        return fetch(url, { cache: 'no-store', mode: 'cors' })
            .then(parseJsonResponse);
    }

    function fetchViewsJson(urls) {
        function tryNext(index) {
            if (index >= urls.length) {
                throw new Error('All views sources failed');
            }
            var url = urls[index];
            return fetchViewsByUrl(url).catch(function () {
                var proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
                return fetchViewsByUrl(proxyUrl).catch(function () {
                    return tryNext(index + 1);
                });
            });
        }
        return tryNext(0);
    }

    function normalizePath(path) {
        var base = window.location.origin;
        try {
            var url = new URL(path || window.location.pathname, base);
            var pathname = decodeURIComponent(url.pathname || '/');
            return pathname.replace(/\/+$/, '') || '/';
        } catch (e) {
            return String(path || window.location.pathname || '/').replace(/\/+$/, '') || '/';
        }
    }

    function formatViews(value) {
        var number = Number(value);
        if (!isFinite(number)) return '—';
        return number.toLocaleString('ru-RU');
    }

    function renderViews(text) {
        var valueNodes = document.querySelectorAll('.lpm-article-views-value');
        if (!valueNodes.length) return;
        valueNodes.forEach(function (node) {
            node.textContent = text;
        });
    }

    function renderDateFromData() {
        var root = document.querySelector('.lpm-article-views');
        var dateNode = document.querySelector('.lpm-article-date');
        if (!root || !dateNode) return;
        var customDate = root.getAttribute('data-article-date');
        if (customDate) dateNode.textContent = customDate;
    }

    function resolveArticlePath() {
        var root = document.querySelector('.lpm-article-views');
        if (!root) return normalizePath(window.location.pathname);
        var customPath = root.getAttribute('data-article-path');
        if (!customPath) return normalizePath(window.location.pathname);
        return normalizePath(customPath);
    }

    function getMetrikaCounterId() {
        var root = document.querySelector('.lpm-article-views');
        if (!root) return 0;
        var id = Number(root.getAttribute('data-yandex-counter-id') || 0);
        return isFinite(id) ? id : 0;
    }

    function sendMetrikaHit(articlePath) {
        var counterId = getMetrikaCounterId();
        if (!counterId || typeof window.ym !== 'function') return;
        var absoluteUrl = window.location.origin + articlePath;
        try {
            window.ym(counterId, 'hit', absoluteUrl, {
                title: document.title || 'Статья'
            });
        } catch (e) {
            /* ignore */
        }
    }

    function updateArticleViews() {
        var urls = resolveViewsJsonUrls();
        if (!urls.length) {
            renderViews('—');
            return;
        }
        var articlePath = resolveArticlePath();
        fetchViewsJson(urls)
            .then(function (data) {
                var viewsMap = (data && data.views) || {};
                renderViews(formatViews(viewsMap[articlePath]));
            })
            .catch(function () {
                renderViews('—');
            });
    }

    var intervalId = null;

    function start() {
        var articlePath = resolveArticlePath();
        renderDateFromData();
        sendMetrikaHit(articlePath);
        updateArticleViews();
        if (intervalId === null) {
            intervalId = setInterval(updateArticleViews, refreshMs);
        }
    }

    function schedule() {
        start();
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', schedule);
    } else {
        schedule();
    }
    window.addEventListener('load', schedule);
    setTimeout(schedule, 0);
    setTimeout(schedule, 400);
    setTimeout(schedule, 1200);
})();
</script>
